        '#type': radios
        '#title': 'Membership Term'
        '#title_display': invisible
        '#options':
          1: 'Individual Certification - Expiry date: 31 August 2026'
        '#required': true
        '#default_value': '1'
      civicrm_1_membership_1_membership_fee_amount:
        '#type': computed_twig
        '#title': 'Computed Amount [$]'
        '#description': '<p>Includes non-refundable application fee.</p><ul><li>CTAM - $25</li><li>CPAM - $50</li><li>CSAM - $50</li><li>CEAM - $50</li><li>CFAM - $50</li></ul>'
        '#template': |
          {% if data.civicrm_1_membership_1_membership_membership_type_id == '25' %}
          {% set amount = 185 %}
          {{ ((((('2026-08-31'|date("U") - "now"|date("U") ))/86400/365*amount))*data.discount+25)|round(2, 'floor')|number_format(2) }}
          {% elseif data.civicrm_1_membership_1_membership_membership_type_id == '26'%}
          {% set amount = 235 %}
          {{ ((((('2026-08-31'|date("U") - "now"|date("U") ))/86400/365*amount))*data.discount+50)|round(2, 'floor')|number_format(2) }}
          {% elseif data.civicrm_1_membership_1_membership_membership_type_id == '27'%}
          {% set amount = 295 %}
          {{ ((((('2026-08-31'|date("U") - "now"|date("U") ))/86400/365*amount))*data.discount+50)|round(2, 'floor')|number_format(2) }}
          {% elseif data.civicrm_1_membership_1_membership_membership_type_id == '31'%}
          {% set amount = 235 %}
          {{ ((((('2026-08-31'|date("U") - "now"|date("U") ))/86400/365*amount))*data.discount+50)|round(2, 'floor')|number_format(2) }}
          {% elseif data.civicrm_1_membership_1_membership_membership_type_id == '32'%}
          {% set amount = 355 %}
          {{ ((((('2026-08-31'|date("U") - "now"|date("U") ))/86400/365*amount))*data.discount+50)|round(2, 'floor')|number_format(2) }}
          {% endif %}
        '#store': true
        '#ajax': true
        '#data_type': Money
        '#extra':
          field_prefix: $
          point: .
          separator: ','
          decimals: 2
          min: 0
        '#form_key': civicrm_1_membership_1_membership_fee_amount
        '#parent': civicrm_1_contact_1_fieldset_fieldset

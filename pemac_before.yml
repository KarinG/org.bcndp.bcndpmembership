    i_agree_to_abide_by_the_pemac_code_of_ethics:
      '#type': checkbox
      '#title': 'I agree to abide by the PEMAC Code of Ethics'
      '#required': true
    code_of_ethics:
      '#type': more
      '#more_title': 'Review Code of Ethics'
      '#more': '<p>We, the members of PEMAC, recognize the importance of technologies to our employers and fellow employees and practitioners. We accept a personal obligation to our profession, its members and the community we serve. To uphold and advance the integrity, honour and dignity of the professions involved in Maintenance, Reliability and Asset Management, we hereby commit ourselves to the highest ethical and professional conduct and agree:</p><ul><li>to accept responsibility in making daily decisions consistent with the safety, health and welfare of the public, and to disclose promptly factors that might endanger them or the environment.</li><li>to avoid real or perceived conflicts of&nbsp;interest whenever possible, and to disclose them to affected parties when they do exist.</li><li>to be honest and realistic in stating claims or estimates based on available data.</li><li>to reject bribery in all of its forms.</li><li>to improve the understanding of technology, its appropriate application, and potential consequences.</li><li>to maintain and improve the prestige and competence of the maintenance profession.</li><li>to support the professional and technical societies of our various disciplines.</li><li>to undertake technological tasks for others only if qualified by training or experience, or&nbsp;after full disclosure of pertinent limitations.</li><li>to seek, accept, and offer honest criticism of technical work, to acknowledge and correct errors, and to credit properly the contributions of others.</li><li>to treat fairly all persons regardless of such factors as race, religion, gender, disability, age, or national origin.</li></ul>'
    cpd_requirements:
      '#type': checkbox
      '#title': 'I understand there are Continuing Professional Development (CPD) requirements associated with Certification'
      '#required': true
    cpd_requirements_more:
      '#type': more
      '#more_title': 'Review CPD Requirements'
      '#more': '<h5>CPD Requirements by Category&nbsp;</h5><p>Your tracked CPD hours will be evaluated based on the total accumulated on a three year, rolling basis according to the table, below.</p><p>&nbsp;</p><p><img src="/sites/default/files/2026-04/GCS_CPD_Requirements.png"></p>'

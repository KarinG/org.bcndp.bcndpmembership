    '#type': fieldset
    '#title': 'Portfolio Instructions'
    '#description': '<p>Upload specific documents that provide evidence of the competencies&nbsp;which have been described in your narratives. The document titles, below are placeholder examples. It is acknowledged that specifics will vary depending on the role, type of organization and type of project.</p><p>Before uploading, name each&nbsp;file&nbsp;as follows:</p><p style="margin-left:40px;">YourLastName_YourFirstInitial_ItemDescription_NarrativeNumber.pdf&nbsp;</p><p style="margin-left:40px;">For example: <strong>Smith_J_AMPolicy_Narrative3.pdf</strong></p><p>If you have concerns about sharing any of these documents due to proprietary considerations, note that it will be possible to show them, instead,&nbsp;to the certification assessors during the interview. In that case, upload a document that indicates the items that you will share during the interview.</p><p>It is acknowledged that organizations use different terminology and may combine some standard Asset Management portfolio documents with other organizational documentation. Documents that would be equivalent to these will be considered.</p>'
